<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPTEL Architecture Practice Portal</title>
    <style>
        /* Base styles matching image_10.png */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            color: #333;
        }

        /* Main container for the whole menu */
        .main-container {
            width: 100%;
            max-width: 600px; /* Limits width on desktop */
            margin-top: 20px;
        }

        /* Header section with instruction and home icon */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            line-height: 1.3;
            font-weight: 600;
        }

        .home-icon {
            font-size: 24px;
            text-decoration: none;
            color: #333;
        }

        /* Button list container */
        .button-list {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between buttons */
        }

        /* Style for the link tag itself */
        .quiz-link {
            text-decoration: none; /* Removes underline */
            display: block; /* Makes the entire link area clickable */
        }

        /* Style for the buttons matching image_10.png */
        .quiz-button {
            background-color: #6c7d92; /* The exact grey-blue from your photo */
            color: #ffffff;
            border: none;
            border-radius: 8px; /* Rounded corners */
            padding: 18px; /* Vertical size */
            font-size: 18px;
            text-align: center;
            width: 100%; /* Spans full container width */
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        /* Simple hover effect */
        .quiz-button:hover {
            background-color: #5a6a7e;
        }

        /* Click effect */
        .quiz-button:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="header-section">
            <h1>Please select which week you<br>would like to practice -</h1>
            <a href="#" class="home-icon">⌂</a> </div>

        <div class="button-list">
            
            <a href="quiz1.html" target="_blank" class="quiz-link">
                <button class="quiz-button">week - 1</button>
            </a>

            <a href="quiz2.html" target="_blank" class="quiz-link">
                <button class="quiz-button">week - 2</button>
            </a>

            <a href="quiz3.html" target="_blank" class="quiz-link">
                <button class="quiz-button">week - 3</button>
            </a>

            <a href="quiz4.html" target="_blank" class="quiz-link">
                <button class="quiz-button">week - 4</button>
            </a>

            </div>
    </div>

</body>
</html>
