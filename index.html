<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPTEL Architecture Master Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        .container { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        h3 { text-align: center; color: #5f6368; margin-bottom: 15px; }
        
        #menu-view { display: block; }
        #quiz-view { display: none; }

        .section-box { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e0e0e0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .quiz-button { background-color: #6c7d92; color: white; border: none; border-radius: 8px; padding: 15px; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .quiz-button:hover { background-color: #5a6a7e; transform: translateY(-2px); }
        
        .btn-blue { background-color: #1a73e8; }
        .btn-green { background-color: #34a853; }
        .btn-red { background-color: #d93025; }
        .full-width { grid-column: span 2; margin-top: 5px; }

        /* Quiz Internal Styles */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .back-btn { background-color: #e0e0e0; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .question p { font-weight: bold; font-size: 1.1em; }
        .options label { display: block; margin-bottom: 10px; cursor: pointer; padding: 8px; border-radius: 5px; transition: background 0.2s; }
        .options label:hover { background-color: #f8f9fa; }
        .submit-btn { display: block; width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; margin-top: 20px; }
        #result { margin-top: 20px; font-size: 1.5em; font-weight: bold; text-align: center; }
        .correct-text { color: #137333; font-weight: bold; margin-left: 10px;}
        .wrong-text { color: #c5221f; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>

    <div class="container" id="menu-view">
        <h1>NPTEL Exam Portal</h1>

        <div class="section-box">
            <h3>📝 Conceptual Practice (Text)</h3>
            <div class="grid-2">
                <button class="quiz-button" onclick="loadQuiz(1)">Week 1</button>
                <button class="quiz-button" onclick="loadQuiz(2)">Week 2</button>
                <button class="quiz-button" onclick="loadQuiz(3)">Week 3</button>
                <button class="quiz-button" onclick="loadQuiz(4)">Week 4</button>
                <button class="quiz-button btn-blue full-width" onclick="loadQuiz('all')">🔥 ALL WEEKS TEXT (Mixed)</button>
            </div>
        </div>

        <div class="section-box">
            <h3>🖼️ Visual Identification</h3>
            <div class="grid-2">
                <button class="quiz-button btn-green" onclick="window.location.href='visual_quiz1.html'">Visual Q - W1</button>
                <button class="quiz-button btn-green" onclick="window.location.href='visual_quiz2.html'">Visual Q - W2</button>
                <button class="quiz-button btn-green" onclick="window.location.href='visual_quiz3.html'">Visual Q - W3</button>
                <button class="quiz-button btn-green" onclick="window.location.href='visual_quiz4.html'">Visual Q - W4</button>
                <button class="quiz-button btn-red full-width" onclick="mixVisuals()">🚀 MIXED VISUALS (Random Week)</button>
            </div>
        </div>
    </div>

    <div class="container" id="quiz-view">
        <div class="nav-bar">
            <button class="back-btn" onclick="goBack()">← Menu</button>
            <h2 id="quiz-title" style="margin: 0; color: #1a73e8;">Quiz</h2>
            <button class="back-btn" id="retry-btn" onclick="resetQuiz()" style="display:none; background-color: #34a853; color: white;">↻ Try Again</button>
        </div>
        <div id="quiz-content"></div>
        <button class="submit-btn" id="main-submit" onclick="calculateScore()">Submit All Answers</button>
        <div id="result"></div>
    </div>

    <script>
        const quizDatabase = {
            1: [
                {q: "Mauryan Ashokan columns were inspired by:", opts: ["Large trees", "Ruins of Persepolis", "Mount Meru", "Tower of victory"], a: "Ruins of Persepolis"},
                {q: "The earliest extant free-standing temple is at Sanchi, known as:", opts: ["Temple 17 from the early 5th century CE", "Temple 30 from the 8th century CE", "Temple 64 from 500 BCE", "Virupaksha temple from 200 CE"], a: "Temple 17 from the early 5th century CE"},
                {q: "The following temple is not monolithic:", opts: ["Kailas temple at Ellora", "Arjuna ratha at Mammalapuram", "Shore temple at Mammalapuram", "Cave 5 at Elephanta"], a: "Shore temple at Mammalapuram"},
                {q: "The earliest excavated cave architecture in India dates to:", opts: ["1000-500 BCE", "300-200 BCE", "100-200 CE", "200-500 CE"], a: "300-200 BCE"},
                {q: "The two main types of temple superstructures are:", opts: ["Latina and kutina", "Kutina and Vesara", "Latina and Bhumija", "Kalinga and Kutina"], a: "Latina and kutina"},
                {q: "A Hindu temple is:", opts: ["A shelter for divinity", "A model of heaven", "A place for cooking", "A palace for the king"], a: "A shelter for divinity"},
                {q: "Buddhist viharas are:", opts: ["Places of community prayer", "Residential arrangements for monks", "A necropolis", "Depictions of the Buddha"], a: "Residential arrangements for monks"},
                {q: "The Indus Valley Civilisation was known for:", opts: ["Brick architecture", "Grid-iron planning of streets", "Planned drainage system with inspection chambers", "All of the above"], a: "All of the above"},
                {q: "Buddhist architecture before 400 BCE comprised:", opts: ["Stupas", "Statues of Buddha", "Both of the above", "None of the above"], a: "None of the above"},
                {q: "In western India, a unique type of temple superstructure was the:", opts: ["Kalinga", "Shekhari", "Bhumija", "Phamsana"], a: "Bhumija"}
            ],
            2: [
                {q: "Features of architecture in Samarkand that influenced Mughals:", opts: ["Bulbous dome, ivans, large portal", "Arches, windows, walls", "Tiles, square based pillars", "Lintel and beam"], a: "Bulbous dome, ivans, large portal"},
                {q: "The fort of Bidar was built by:", opts: ["Sultans of Gujarat", "Sultans of Bijapur", "The Bahmani Sultans", "Kings of Vijaynagara"], a: "The Bahmani Sultans"},
                {q: "The Kingdom of Vijayanagar was founded by", opts: ["Simukha and Kanishka", "Harihara and Bukka", "King Vijaya", "Digvijaya"], a: "Harihara and Bukka"},
                {q: "The Chand Minar was built in:", opts: ["Delhi", "Bidar", "Daulatabad", "Golconda"], a: "Daulatabad"},
                {q: "Hammams were lit and ventilated by:", opts: ["Small openings in the roof", "Large windows", "Artificial ventilation", "All of the above"], a: "Small openings in the roof"},
                {q: "The water distribution technologies of the sultanates used:", opts: ["Pipes and conduits", "Qanats", "Sited far from water", "All of the above"], a: "All of the above"},
                {q: "The great mosque of Daulatabad shows:", opts: ["Break in traditions", "Continuity of traditions", "Artisans from Gujarat", "Masons from Delhi"], a: "Continuity of traditions"},
                {q: "The temple at Anwa has which type of dome?", opts: ["Squinch", "Circular", "Corbelled", "Arched"], a: "Corbelled domes"},
                {q: "Timurid influence on Sultanate architecture was in:", opts: ["Proportions", "Colour schemes", "Decorative tiles", "All of the above"], a: "All of the above"},
                {q: "Defense features of Daulatabad included:", opts: ["Thorny hedges", "Dark tunneled passages", "Mines", "Wild animals"], a: "Dark tunneled passages"}
            ],
            3: [
                {q: "Salient feature borrowed from Timurids:", opts: ["Arches", "Pillars", "Ivans", "Pavilions"], a: "Ivans"},
                {q: "Pietra Dura is a name for:", opts: ["Semi-precious stone inlay", "Stone carving", "Woodwork", "Tile work"], a: "Semi-precious stone inlay"},
                {q: "Hasht Bihisht plan comprised:", opts: ["Circular room", "Four sets of corner rooms and iwans", "Garden building", "All of the above"], a: "Four sets of corner rooms and iwans"},
                {q: "The odd one out architecturally:", opts: ["Bibi-Ka-Maqbara", "Humayun's Tomb", "Akbar's Tomb", "Taj Mahal"], a: "Akbar's Tomb"},
                {q: "Citadel inside Shahajahanbad is called:", opts: ["Purana Qila", "Red Fort", "Chand minar", "Delhi Fort"], a: "Red Fort"},
                {q: "The four garden plan is termed:", opts: ["Chahar bagh", "Chini Khana", "Two portion system", "Circular garden"], a: "Chahar bagh"},
                {q: "Mughal architectural elements include:", opts: ["Bangla roofs", "Baluster columns", "Multifoil arches", "All of the above"], a: "All of the above"},
                {q: "Early Maratha architecture was similar to:", opts: ["Mughal", "Yadava", "Sultanate", "Rashtrakuta"], a: "Sultanate architecture"},
                {q: "Hauz-i-Nilofer was built by:", opts: ["Babur", "Akbar", "Shah Jahan", "Aurangzeb"], a: "Babur"},
                {q: "Bhumija-Shekhari temples from 18th century are found in:", opts: ["Madhya Pradesh", "Maharashtra", "Gujarat", "Rajasthan"], a: "Maharashtra"}
            ],
            4: [
                {q: "Chandigarh was designed by:", opts: ["B.V.Doshi", "Louis Kahn", "Le Corbusier", "Charles Correa"], a: "Le Corbusier"},
                {q: "Only Indian winner of the Pritzker:", opts: ["Charles Correa", "Kulbhushan Jain", "Balkrishna V Doshi", "G.B.Mhatre"], a: "Balkrishna V Doshi"},
                {q: "The Holkar Palace at Chandwad is built of:", opts: ["Wood, stone and lime plaster", "Concrete", "Steel", "Only Brick"], a: "Wood, stone and lime plaster"},
                {q: "Modern architecture relevant to India example:", opts: ["IUCAA, Pune", "Majestic Buildings", "Osmania Hospital", "Jaipur Palace"], a: "The IUCAA, Pune"},
                {q: "Pillar orders in Neo-classical styles:", opts: ["Ionic, Corinthian, Doric, Tuscan", "Square, hexagonal", "Squinch", "Fluted only"], a: "Ionic, Corinthian, Doric, Tuscan"},
                {q: "Style that first tied India to international architecture:", opts: ["Indo-saracenic", "Art Deco", "Modern", "Neo-classical"], a: "Art Deco"},
                {q: "Contemporary practice often privileges:", opts: ["Design over economy", "Economy of construction", "Developers", "Imitation"], a: "Economy of construction over good design"},
                {q: "Kanchenjunga Apartments designed by:", opts: ["Charles Correa", "B.V. Doshi", "Raj Rewal", "Louis Kahn"], a: "Charles Correa"},
                {q: "IIM Ahmedabad designed by:", opts: ["Louis Kahn", "Le Corbusier", "B.V. Doshi", "Charles Correa"], a: "Louis Kahn"},
                {q: "Lutyens' Delhi dome is inspired by:", opts: ["Taj Mahal", "Sanchi Stupa", "Persepolis", "Pantheon"], a: "Sanchi Stupa"}
            ]
        };

        let currentQuizData = [];
        let currentMode = '';

        function loadQuiz(mode) {
            currentMode = mode;
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('main-submit').style.display = 'block';
            document.getElementById('result').innerHTML = '';
            
            if (mode === 'all') {
                document.getElementById('quiz-title').innerText = "All Weeks Mixed";
                currentQuizData = [...quizDatabase[1], ...quizDatabase[2], ...quizDatabase[3], ...quizDatabase[4]];
            } else {
                document.getElementById('quiz-title').innerText = `Week - ${mode}`;
                currentQuizData = [...quizDatabase[mode]];
            }
            renderQuestions();
        }

        function renderQuestions() {
            currentQuizData.sort(() => Math.random() - 0.5);
            const quizContainer = document.getElementById('quiz-content');
            quizContainer.innerHTML = ''; 
            currentQuizData.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.classList.add('question');
                let shuffledOptions = [...q.opts].sort(() => Math.random() - 0.5);
                let optionsHTML = '';
                shuffledOptions.forEach(opt => {
                    optionsHTML += `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>`;
                });
                questionDiv.innerHTML = `<p>${index + 1}) ${q.q} <span id="feedback-${index}"></span></p><div class="options">${optionsHTML}</div>`;
                quizContainer.appendChild(questionDiv);
            });
            window.scrollTo(0, 0);
        }

        function resetQuiz() {
            document.getElementById('result').innerHTML = '';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('main-submit').style.display = 'block';
            renderQuestions();
        }

        function goBack() {
            document.getElementById('menu-view').style.display = 'block';
            document.getElementById('quiz-view').style.display = 'none';
        }

        function calculateScore() {
            let score = 0;
            currentQuizData.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const feedback = document.getElementById(`feedback-${index}`);
                if (selected) {
                    if (selected.value.includes(q.a) || q.a.includes(selected.value)) {
                        score++; feedback.innerHTML = "✅ Correct"; feedback.className = "correct-text";
                    } else {
                        feedback.innerHTML = `❌ Wrong (Ans: ${q.a})`; feedback.className = "wrong-text";
                    }
                } else {
                    feedback.innerHTML = `⚠️ Unanswered (Ans: ${q.a})`; feedback.className = "wrong-text";
                }
            });
            document.getElementById('result').innerHTML = `Final Score: ${score} / ${currentQuizData.length}`;
            document.getElementById('retry-btn').style.display = 'block';
            document.getElementById('main-submit').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function mixVisuals() {
            const quizzes = ['visual_quiz1.html', 'visual_quiz2.html', 'visual_quiz3.html', 'visual_quiz4.html'];
            window.location.href = quizzes[Math.floor(Math.random() * quizzes.length)];
        }
    </script>
</body>
</html>
