<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Quiz - Assignment 4</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #1a73e8;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .question {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question p {
            font-weight: bold;
            font-size: 1.1em;
        }
        .options label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .options label:hover {
            background-color: #f8f9fa;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background-color: #1557b0;
        }
        #result {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
        }
        .correct-text { color: #137333; font-weight: bold; margin-left: 10px;}
        .wrong-text { color: #c5221f; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>

    <h1>NPTEL Architecture - Assignment 4</h1>
    
    <div class="quiz-container" id="quiz">
        </div>

    <button class="submit-btn" onclick="calculateScore()">Submit Answers</button>
    <div id="result"></div>

    <script>
        const quizData = [
            {
                question: " Princely states in India emulated the architecture of",
                options: ["The Mughals", "The British", "Anyone in power above them", "All of the above"],
                answer: "All of the above"
            },
            {
                question: " Chandigarh was designed by",
                options: ["B.V.Doshi", "Louis Kahn", "Le Corbusier", "Charles Correa"],
                answer: "Le Corbusier"
            },
            {
                question: " The Holkar Palace at Chandwad is",
                options: ["Built using wood, stone and lime plaster", "Set in the middle of urban settings", "Ornamented with woodwork and stucco", "All of the above"],
                answer: "All of the above"
            },
            {
                question: " A good example of modern architecture relevant to India is:",
                options: ["The Inter-University Centre for Astronomy and Astrophysics (IUCAA), Pune", "Majestic Buildings, Mumbai", "Osmania Hospital, Hyderabad", "Jaipur Palace"],
                answer: "The Inter-University Centre for Astronomy and Astrophysics (IUCAA), Pune"
            },
            {
                question: " Palaces built in 18th and 19th century imported ____________ from Europe and other countries",
                options: ["Glass, tiles and timber material", "Artisans and craftsmen", "Spices", "Courtyard system"],
                answer: "Glass, tiles and timber material"
            },
            {
                question: " The Marathas build palaces that",
                options: ["Borrowed architectural elements from the Mughals", "Were based on vernacular domestic architecture", "Both of the above", "None of the above"],
                answer: "None of the above"
            },
            {
                question: " Name the pillar orders followed by Neo-classical architectural styles",
                options: ["Doric, Fluted", "Ionic, Corinthian, Doric, Tuscan", "Square, hexagonal, obelisk", "Squinch, straight"],
                answer: "Ionic, Corinthian, Doric, Tuscan"
            },
            {
                question: " The only Indian winner of the prestigious Pritzker in architecture has been:",
                options: ["Charles Correa", "Kulbhushan Jain", "Balkrishna V Doshi", "G.B.Mhatre"],
                answer: "Balkrishna V Doshi"
            },
            {
                question: " The architectural style that first tied India to an international architecture was",
                options: ["Indo-saracenic", "Art Deco", "Modern", "Neo-classical"],
                answer: "Art Deco"
            }
        ];

        // Shuffle the questions so they are random every time!
        quizData.sort(() => Math.random() - 0.5);

        const quizContainer = document.getElementById('quiz');

        // Render the quiz
        quizData.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.classList.add('question');
            questionDiv.id = `q-block-${index}`;
            
            let optionsHTML = '';
            
            // Shuffle the options inside the question too! (Optional, but helps with memorizing)
            let shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                optionsHTML += `
                    <label>
                        <input type="radio" name="question${index}" value="${opt}">
                        ${opt}
                    </label>
                `;
            });

            questionDiv.innerHTML = `
                <p>${q.question} <span id="feedback-${index}"></span></p>
                <div class="options">
                    ${optionsHTML}
                </div>
            `;
            quizContainer.appendChild(questionDiv);
        });

        function calculateScore() {
            let score = 0;
            quizData.forEach((q, index) => {
                const selectedOption = document.querySelector(`input[name="question${index}"]:checked`);
                const feedbackSpan = document.getElementById(`feedback-${index}`);
                
                if (selectedOption) {
                    if (selectedOption.value === q.answer) {
                        score++;
                        feedbackSpan.innerHTML = "✅ Correct";
                        feedbackSpan.className = "correct-text";
                    } else {
                        feedbackSpan.innerHTML = `❌ Wrong (Answer: ${q.answer})`;
                        feedbackSpan.className = "wrong-text";
                    }
                } else {
                    feedbackSpan.innerHTML = `⚠️ Unanswered (Answer: ${q.answer})`;
                    feedbackSpan.className = "wrong-text";
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `You scored ${score} out of ${quizData.length}!`;
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
